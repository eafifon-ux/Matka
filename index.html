<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matka Mail</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="app">

    <h1>Matka Mail</h1>

    <!-- CONNECT SCREEN -->
    <div id="connect-screen" class="screen">
      <h2>Connect your account</h2>

      <div class="providers">
        <button onclick="connect('gmail')">Gmail</button>
        <button onclick="connect('outlook')">Outlook</button>
        <button onclick="connect('zoho')">Zoho</button>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="main-app" style="display:none;">

      <!-- GPC DISPLAY (IMPORTANT) -->
      <div id="gpc-display"></div>

      <!-- CONTROLS -->
      <div id="controls">
        <button data-mode="DOY" class="active">DOY</button>
        <button data-mode="DOS">DOS</button>
        <button data-mode="DOM">DOM</button>
        <button id="heptad-btn">Heptad</button>
      </div>

      <!-- COMPOSER -->
      <div id="composer">
        <h3>New Message</h3>

        <input id="to" placeholder="To" /><br><br>
        <input id="subject" placeholder="Subject" /><br><br>
        <textarea id="body" placeholder="Write your message..."></textarea><br><br>

        <button onclick="sendEmail()">Send</button>
      </div>

      <!-- INBOX -->
      <div id="inbox-section">
        <h3>Inbox</h3>
        <div id="emails"></div>
      </div>

    </div>

  </div>

  <!-- ========================= -->
  <!-- 1. GPC ENGINE (LOAD FIRST) -->
  <!-- ========================= -->
  <script src="game.js"></script>

  <!-- ========================= -->
  <!-- 2. EMAIL SYSTEM (ISOLATED) -->
  <!-- ========================= -->
  <script>
    let emailRetry = 2000;

    async function loadEmails() {
      try {
        const res = await fetch("https://matka-3.onrender.com/emails", {
          cache: "no-store"
        });

        const data = await res.json();

        const container = document.getElementById("emails");

        container.innerHTML = data.map(e => `
          <div style="border:1px solid #ccc; margin:10px; padding:10px;">
            <b>${e.subject}</b><br/>
            <small>From: ${e.from}</small><br/>
            <p>${e.body}</p>
          </div>
        `).join("");

        emailRetry = 2000;

      } catch (err) {
        console.log("Email fetch retry...", err);

        emailRetry = Math.min(emailRetry * 1.5, 10000);

        setTimeout(loadEmails, emailRetry);
        return;
      }
    }

    // SAFE START (DO NOT BLOCK GPC)
    window.addEventListener("load", () => {
      loadEmails();
      setInterval(loadEmails, 5000);
    });
  </script>

</body>
</html>
